{% extends "base.html" %}
{% block content %}
<div class="mb-3"><a href="{{ url_for('admin.manajemen_user') }}" class="btn btn-sm btn-secondary">&larr; Kembali ke Daftar Akun</a></div>

<div class="card shadow-sm" style="max-width:640px">
    <div class="card-header bg-warning fw-bold">Ubah Akun: {{ user.username }}</div>
    <div class="card-body">
        <form method="POST" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input class="form-control" value="{{ user.username }}" disabled>
                <small class="text-muted">Username tidak dapat diubah.</small>
            </div>
            <div class="col-md-6">
                <label class="form-label">Nama Lengkap</label>
                <input name="nama_lengkap" class="form-control" value="{{ user.nama_lengkap }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Peran</label>
                <select name="peran" class="form-select">
                    {% for opt in peran_opsi %}
                    <option value="{{ opt }}" {% if user.peran == opt %}selected{% endif %}>{{ opt }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Nama Pokmil</label>
                <input name="nama_pokmil" class="form-control" value="{{ user.nama_pokmil or '' }}" placeholder="Kosongkan jika bukan Pokmil">
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_ketua_pokmil" id="ketua" {% if user.is_ketua_pokmil %}checked{% endif %}>
                    <label class="form-check-label" for="ketua">Tetapkan sebagai Ketua Pokmil</label>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password Baru</label>
                <input type="password" name="password" class="form-control" placeholder="Kosongkan jika tidak diganti">
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary">Simpan Perubahan</button>
                <a href="{{ url_for('admin.manajemen_user') }}" class="btn btn-secondary">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
